<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Tic-Tac-Toe Game</title>
</head>

<body>
    <div class="container">
        <header>
            <h1>🎮 Tic Tac Toe</h1>
            <div class="turn-indicator">
                <span class="player" id="player-turn">Player: <strong>X</strong></span>
            </div>
        </header>

        <main>
            <div class="game-wrapper">
                <div class="game-board">
                    <button class="box" data-index="0"></button>
                    <button class="box" data-index="1"></button>
                    <button class="box" data-index="2"></button>
                    <button class="box" data-index="3"></button>
                    <button class="box" data-index="4"></button>
                    <button class="box" data-index="5"></button>
                    <button class="box" data-index="6"></button>
                    <button class="box" data-index="7"></button>
                    <button class="box" data-index="8"></button>
                </div>
            </div>

            <div class="msg-container hide" id="msg-container">
                <div class="win-message">
                    <p id="msg"></p>
                </div>
                <button class="btn btn-primary" id="new-btn">Play Again</button>
            </div>

            <div class="button-group">
                <button class="btn btn-secondary" id="reset-btn">Reset Game</button>
            </div>
        </main>

        <footer>
            <p>Made with ❤️ by Syed Wasay Ali Shah</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>

</html>
